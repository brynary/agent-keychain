name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift build and tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Run core command tests
        run: swift run agent-keychain-test-runner

      - name: Build CLI executable for black-box tests
        run: swift build --product agent-keychain

      - name: Run black-box integration tests
        run: swift run agent-keychain-black-box-test-runner

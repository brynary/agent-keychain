name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PRODUCT_NAME: agent-keychain
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Run core command tests
        run: swift run agent-keychain-test-runner

      - name: Build CLI executable for black-box tests
        run: swift build --product "$PRODUCT_NAME"

      - name: Run black-box integration tests
        run: swift run agent-keychain-black-box-test-runner

      - name: Build release binary
        run: swift build -c release --product "$PRODUCT_NAME"

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          arch="$(uname -m)"
          asset_name="${PRODUCT_NAME}-${version}-macos-${arch}"
          asset_dir="dist/${asset_name}"
          archive_path="dist/${asset_name}.tar.gz"
          checksum_path="${archive_path}.sha256"

          mkdir -p "$asset_dir"
          cp ".build/release/${PRODUCT_NAME}" "$asset_dir/"
          cp README.md "$asset_dir/"
          tar -czf "$archive_path" -C dist "$asset_name"

          (
            cd dist
            shasum -a 256 "${asset_name}.tar.gz" > "${asset_name}.tar.gz.sha256"
          )

          {
            echo "archive=$archive_path"
            echo "checksum=$checksum_path"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "$ARCHIVE" \
              "$CHECKSUM" \
              --clobber
          else
            prerelease_flag=()
            if [[ "$RELEASE_TAG" == *-* ]]; then
              prerelease_flag=(--prerelease)
            fi

            gh release create "$RELEASE_TAG" \
              "$ARCHIVE" \
              "$CHECKSUM" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              "${prerelease_flag[@]}"
          fi

      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$RELEASE_TAG" == *-* ]]; then
            echo "Skipping Homebrew formula update for prerelease tag ${RELEASE_TAG}"
            exit 0
          fi

          release_revision="$(git rev-list -n 1 "$RELEASE_TAG")"

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout -B main origin/main

          ruby scripts/update-homebrew-formula.rb \
            Formula/agent-keychain.rb \
            "$RELEASE_TAG" \
            "$release_revision"

          if git diff --quiet -- Formula/agent-keychain.rb; then
            echo "Homebrew formula already points at ${RELEASE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-keychain.rb
          git commit -m "build: update Homebrew formula for ${RELEASE_TAG}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done

          echo "Unable to push Homebrew formula update after 3 attempts" >&2
          exit 1

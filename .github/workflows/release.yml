name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PRODUCT_NAME: agent-keychain
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  package:
    name: Build and package (${{ matrix.asset_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            asset_arch: arm64
          - runner: macos-15-intel
            asset_arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check runner architecture
        env:
          ASSET_ARCH: ${{ matrix.asset_arch }}
        shell: bash
        run: |
          set -euo pipefail

          actual_arch="$(uname -m)"
          if [[ "$actual_arch" != "$ASSET_ARCH" ]]; then
            echo "Expected ${ASSET_ARCH}, got ${actual_arch}" >&2
            exit 1
          fi

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Run core command tests
        run: swift run agent-keychain-test-runner

      - name: Build CLI executable for black-box tests
        run: swift build --product "$PRODUCT_NAME"

      - name: Run black-box integration tests
        run: swift run agent-keychain-black-box-test-runner

      - name: Build release binary
        run: swift build -c release --product "$PRODUCT_NAME"

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          asset_name="${PRODUCT_NAME}-${version}-macos-${ASSET_ARCH}"
          asset_dir="dist/${asset_name}"
          archive_path="dist/${asset_name}.tar.gz"
          checksum_path="${archive_path}.sha256"

          mkdir -p "$asset_dir"
          cp ".build/release/${PRODUCT_NAME}" "$asset_dir/"
          cp README.md "$asset_dir/"
          tar -czf "$archive_path" -C dist "$asset_name"

          (
            cd dist
            shasum -a 256 "${asset_name}.tar.gz" > "${asset_name}.tar.gz.sha256"
          )

          {
            echo "archive=$archive_path"
            echo "checksum=$checksum_path"
          } >> "$GITHUB_OUTPUT"
        env:
          ASSET_ARCH: ${{ matrix.asset_arch }}

      - name: Upload packaged asset
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.asset_arch }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t release_assets < <(find dist -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sha256" \) | sort)
          if [[ "${#release_assets[@]}" -ne 4 ]]; then
            echo "Expected 4 release assets, found ${#release_assets[@]}" >&2
            printf '%s\n' "${release_assets[@]}" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${release_assets[@]}" --clobber
          else
            release_args=("$RELEASE_TAG" "${release_assets[@]}" --title "$RELEASE_TAG" --generate-notes)
            if [[ "$RELEASE_TAG" == *-* ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi

  update-homebrew-formula:
    name: Update Homebrew formula
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download packaged assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          arm64_sha256="$(awk '{print $1}' "dist/${PRODUCT_NAME}-${version}-macos-arm64.tar.gz.sha256")"
          x86_64_sha256="$(awk '{print $1}' "dist/${PRODUCT_NAME}-${version}-macos-x86_64.tar.gz.sha256")"

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout -B main origin/main

          ruby scripts/update-homebrew-formula.rb \
            Formula/agent-keychain.rb \
            "$RELEASE_TAG" \
            "$arm64_sha256" \
            "$x86_64_sha256"

          if git diff --quiet -- Formula/agent-keychain.rb; then
            echo "Homebrew formula already points at ${RELEASE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-keychain.rb
          git commit -m "build: update Homebrew formula for ${RELEASE_TAG}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done

          echo "Unable to push Homebrew formula update after 3 attempts" >&2
          exit 1
